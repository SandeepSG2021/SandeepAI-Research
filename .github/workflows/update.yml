name: SandeepAI Update

# Two cadences:
#   * every 3 hours -> just fetch + commit (cheap, no OpenAI cost)
#   * once daily 11:00 UTC -> also enrich with the insurance angle + email digest
#
# Both flows live in one workflow so they can share the concurrency lock and
# never race against each other while pushing to main.

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
    - cron: "0 11 * * *"    # daily 11:00 UTC for the full job
  workflow_dispatch:
    inputs:
      full:
        description: "Run full job (enrich + email) regardless of schedule"
        required: false
        default: "false"

# Least-privilege token: we push refreshed JSON back to main AND deploy Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two of these in parallel — they all push to main / deploy Pages.
concurrency:
  group: sandeepai-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      # Resolve once: "full" means daily 11:00 UTC OR manual full=true.
      IS_FULL: ${{ github.event.schedule == '0 11 * * *' || github.event.inputs.full == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # needed by the push step
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch all sources
        run: python scripts/fetch_all.py
        continue-on-error: true   # one source down should not block the rest

      - name: Enrich with insurance angle (full run only)
        if: env.IS_FULL == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: python scripts/enrich.py
        continue-on-error: true

      - name: Commit refreshed data
        run: |
          git config user.name  "sandeepai-bot"
          git config user.email "sandeepai-bot@users.noreply.github.com"
          git add site/data/*.json
          if git diff --cached --quiet; then
            echo "no data changes this run"
          else
            label="quick"
            if [ "$IS_FULL" = "true" ]; then label="full"; fi
            git commit -m "chore(data): ${label} refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Send daily email (full run only)
        if: env.IS_FULL == 'true'
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM:     ${{ secrets.MAIL_FROM }}
          MAIL_TO:       "Sandeep.chauhans@gmail.com,Sandeep_singh@manulife.com"
          SITE_URL:      "https://sandeepsg2021.github.io/SandeepAI-Research/"
        run: python scripts/send_email.py

      # ----- Deploy Pages in the SAME workflow ---------------------------
      # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes, so we
      # must deploy here instead of relying on a separate pages-deploy run.
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
